
  <!DOCTYPE html>
  <html lang="pt-BR">
    <head>

      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>AccessFlix — Hub de acessibilidade</title>
      <meta name="description" content="Filmes, séries e jogos com recursos de acessibilidade — audiodescrição, legendas, Libras e linguagem simplificada. Avaliado pela comunidade PCD." />
      <meta name="robots" content="noindex, nofollow" />

      <!-- Atkinson Hyperlegible: criada pelo Braille Institute para baixa visão -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Lexend:wght@400;600;700&display=swap"
        rel="stylesheet"
      />

      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>

    </head>

    <body>

      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>

      <!-- VLibras — official Brazilian government sign-language translator.
           The .enabled class is REQUIRED so the widget bootstraps; we keep it here
           and hide the widget visually via CSS until the user toggles Libras. -->
      <div vw="true" class="enabled" id="af-vlibras-root">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
          <div class="vw-plugin-top-wrapper"></div>
        </div>
      </div>
      <script src="https://vlibras.gov.br/app/vlibras-plugin.js" defer></script>
      <script>
        document.addEventListener('DOMContentLoaded', function () {
          var tryInit = function () {
            if (window.VLibras && typeof window.VLibras.Widget === 'function') {
              try { new window.VLibras.Widget('https://vlibras.gov.br/app'); }
              catch (e) { console.warn('[VLibras] init failed:', e); }
            } else {
              setTimeout(tryInit, 200);
            }
          };
          tryInit();
        });
      </script>

    </body>
  </html>
